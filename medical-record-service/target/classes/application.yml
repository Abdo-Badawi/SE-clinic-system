server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/clinic_db?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

jwt:
  secret: ThisIsAVeryLongSecretKeyForJWTThatIsAtLeast256BitsLongForHS256!!!
  expiration: 86400000

patient:
  service:
    url: http://localhost:8082

doctor:
  service:
    url: http://localhost:8083

appointment:
  service:
    url: http://localhost:8084

eureka:
  client:
    enabled: false

logging:
  level:
    com.clinic.medicalrecord: DEBUG